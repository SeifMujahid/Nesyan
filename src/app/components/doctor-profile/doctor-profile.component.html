<app-main-nav></app-main-nav>
<!-- --------------------------------------------------------------------------------------- -->
<!-- main -->
<!-- --------------------------------------------------------------------------------------- -->
<section
  class="main-section d-flex justify-content-center align-items-start gap-4"
>
  <div class="container">
    <div
      class="top d-flex justify-content-between align-items-center mb-4 border-b"
    >
      <h2>
        <i class="fa-solid fa-user-doctor me-2"></i>
        {{ "PROFILE.DOCTOR_PROFILE" | translate }}
      </h2>
      <a routerLink="/doctor" class="btn btn-primary">
        {{ "PROFILE.BACK_BTN" | translate }}
      </a>
    </div>

    <div
      class="profile-content d-flex justify-content-between align-content-start w-100 p-2"
    >
      <!-- ── Profile Image ── -->
      <div class="profile-image col-2 rounded me-2">
        <img
          class="w-100 rounded"
          src="https://nesyan-api.runasp.net/{{ doctorProfile.imageUrl }}"
          alt="{{ 'PROFILE.DOCTOR_PROFILE' | translate }}"
        />
      </div>

      <!-- ── Info ── -->
      <div class="form-Container col-10">
        <form class="d-flex flex-column justify-content-center w-100 p-2">
          <!-- First Name & Last Name -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="fName">{{ "PROFILE.FIRST_NAME" | translate }}</label>
              <input
                id="fName"
                type="text"
                [value]="doctorProfile.fName"
                disabled
                [attr.aria-label]="'PROFILE.FIRST_NAME' | translate"
              />
            </div>
            <div class="form-group">
              <label for="lName">{{ "PROFILE.LAST_NAME" | translate }}</label>
              <input
                id="lName"
                type="text"
                [value]="doctorProfile.lName"
                disabled
                [attr.aria-label]="'PROFILE.LAST_NAME' | translate"
              />
            </div>
          </div>

          <!-- Username & Age -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="userName">{{
                "PROFILE.USER_NAME" | translate
              }}</label>
              <input
                id="userName"
                type="text"
                [value]="doctorProfile.userName"
                disabled
                [attr.aria-label]="'PROFILE.USER_NAME' | translate"
              />
            </div>
            <div class="form-group">
              <label for="age">{{ "PROFILE.AGE" | translate }}</label>
              <input
                id="age"
                type="text"
                [value]="doctorProfile.age"
                disabled
                [attr.aria-label]="'PROFILE.AGE' | translate"
              />
            </div>
          </div>

          <!-- Country & City -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="country">{{ "PROFILE.COUNTRY" | translate }}</label>
              <input
                id="country"
                type="text"
                [value]="doctorProfile.country"
                disabled
                [attr.aria-label]="'PROFILE.COUNTRY' | translate"
              />
            </div>
            <div class="form-group">
              <label for="city">{{ "PROFILE.CITY" | translate }}</label>
              <input
                id="city"
                type="text"
                [value]="doctorProfile.city"
                disabled
                [attr.aria-label]="'PROFILE.CITY' | translate"
              />
            </div>
          </div>

          <!-- Phone & Email -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="phone">{{ "PROFILE.PHONE" | translate }}</label>
              <input
                id="phone"
                type="text"
                [value]="doctorProfile.phone"
                disabled
                [attr.aria-label]="'PROFILE.PHONE' | translate"
              />
            </div>
            <div class="form-group">
              <label for="email">{{ "PROFILE.EMAIL" | translate }}</label>
              <input
                id="email"
                type="text"
                [value]="doctorProfile.email"
                disabled
                [attr.aria-label]="'PROFILE.EMAIL' | translate"
              />
            </div>
          </div>

          <!-- Gender & National ID -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="gender">{{ "PROFILE.GENDER" | translate }}</label>
              <input
                id="gender"
                type="text"
                [value]="doctorProfile.gender"
                disabled
                [attr.aria-label]="'PROFILE.GENDER' | translate"
              />
            </div>
            <div class="form-group">
              <label for="nationalId">{{
                "PROFILE.NATIONAL_ID" | translate
              }}</label>
              <input
                id="nationalId"
                type="text"
                [value]="doctorProfile.nationalId"
                disabled
                [attr.aria-label]="'PROFILE.NATIONAL_ID' | translate"
              />
            </div>
          </div>

          <!-- Specialization -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="specialization">{{
                "PROFILE.SPECIALIZATION" | translate
              }}</label>
              <input
                id="specialization"
                type="text"
                [value]="
                  doctorProfile.specialization ??
                  ('PROFILE.NO_DATA' | translate)
                "
                disabled
                [attr.aria-label]="'PROFILE.SPECIALIZATION' | translate"
              />
            </div>
            <div class="form-group"></div>
          </div>
        </form>

        <!-- ── Certificates ── -->
        <div class="certificates-section p-2">
          <h6 class="certificates-title mb-3">
            <i class="fa-solid fa-id-card me-2"></i>
            {{ "PROFILE.CERTIFICATES" | translate }}
          </h6>
          <div class="certificates-grid">
            <!-- Graduation Degree -->
            <div class="certificate-card">
              <span class="certificate-label">{{
                "PROFILE.GRADUATION_DEGREE" | translate
              }}</span>
              <div class="certificate-img-wrapper">
                <img
                  src="https://nesyan-api.runasp.net/{{
                    doctorProfile.graduationDegree
                  }}"
                  [attr.alt]="'PROFILE.GRADUATION_DEGREE' | translate"
                  class="certificate-img"
                />
              </div>
            </div>

            <!-- Medical Association Card -->
            <div class="certificate-card">
              <span class="certificate-label">{{
                "PROFILE.MEDICAL_ASSOC_CARD" | translate
              }}</span>
              <div class="certificate-img-wrapper">
                <img
                  src="https://nesyan-api.runasp.net/{{
                    doctorProfile.medicalAssociationCard
                  }}"
                  [attr.alt]="'PROFILE.MEDICAL_ASSOC_CARD' | translate"
                  class="certificate-img"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
