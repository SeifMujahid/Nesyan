<!-- --------------------------------------------------------------------------------------- -->
<!-- mind-games -->
<!-- --------------------------------------------------------------------------------------- -->
<div
  class="tab-content d-flex flex-column justify-content-center align-items-center gap-3 w-100"
>
  <div class="top-part d-flex justify-content-between align-items-center w-100">
    <div class="right">
      <p class="p-0 m-0 fw-bold fs-5">
        <i class="fa-solid fa-gamepad me-1 fs-4" style="color: #9810fa"></i>
        Mind Games
      </p>
      <p class="text-muted m-0 p-0">Assign congnitive games to patients</p>
    </div>
    <div class="left">
      <button data-bs-target="#exampleModalToggle" data-bs-toggle="modal">
        <i class="fa-regular fa-square-plus me-1 fs-5"></i>Add Game
      </button>
    </div>
  </div>
  <div
    class="games-list w-100 d-flex flex-column justify-content-start align-items-center gap-2"
    *ngFor="let game of patientMindGamesList"
  >
    <div class="game">
      <div class="text-muted flex-grow-1">
        <p>{{ game.title }}</p>
        <p>{{ game.subtitle }} - Level: {{ game.level }}</p>
      </div>
      <div class="trash-can" (click)="deletePatientMindGame(game.id)">
        <i class="fa-solid fa-trash-can fs-5 text-danger"></i>
      </div>
    </div>
  </div>
</div>
<!-- --------------------------------------------------------------------------------------- -->
<!-- add-game -->
<!-- --------------------------------------------------------------------------------------- -->
<div
  class="modal fade"
  id="exampleModalToggle"
  aria-hidden="true"
  aria-labelledby="exampleModalToggleLabel"
  tabindex="-1"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalToggleLabel">
          Add New Game
        </h1>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body overflow-y-scroll" style="max-height: 400px">
        <div
          class="form-container fw-bold fs-5 d-flex flex-column justify-content-center align-items-center gap-3 w-100"
        >
          <div
            class="form-group d-flex justify-content-between align-items-center gap-2 w-100 border-b"
            *ngFor="let game of allMindGamesList; let i = index"
          >
            <div class="d-flex flex-column align-items-start fs-6 w-100">
              <span class="m-0 p-0 text-muted">Title:</span>
              <p class="m-0 p-0">{{ game.title }}</p>
              <p class="m-0 p-0 text-muted">Level: {{ game.level }}</p>
              <form class="w-100" [formGroup]="addGame">
                <div class="form-group mb-2">
                  <label for="mindgame-frequency" class="form-label text-muted"
                    >Frequency</label
                  >

                  <select
                    id="mindgame-frequency"
                    name="mindgame-frequency"
                    class="form-select"
                    required
                    formControlName="frequency"
                  >
                    <option value="" disabled selected hidden>
                      Select MindGame frequency
                    </option>
                    <option value="OneTime">OneTime</option>
                    <option value="Daily">Daily</option>
                    <option value="Weekly">Weekly</option>
                    <option value="Monthly">Monthly</option>
                    <option value="Custom">Custom</option>
                  </select>
                </div>
                <div class="form-group mb-2">
                  <label for="mindgame-date" class="form-label text-muted"
                    >Start Date</label
                  >
                  <input
                    type="date"
                    name="mindgame-date"
                    id="mindgame-date"
                    class="form-control"
                    required
                    formControlName="startDate"
                  />
                </div>
              </form>
              <div
                class="d-flex justify-content-evenly align-items-center gap-1 w-100"
              >
                <button
                  class="btn btn-primary w-25"
                  data-bs-target="#exampleModalToggle-2"
                  data-bs-toggle="modal"
                  (click)="showDetails(i)"
                >
                  Details
                </button>
                <button
                  class="btn btn-primary w-25"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                  (click)="completeAddPatientMindGame(game.id)"
                >
                  Add
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- <div class="modal-footer">
        <button class="btn btn-primary">Save</button>
      </div> -->
    </div>
  </div>
</div>
<!-- --------------------------------------------------------------------------------------- -->
<!-- about-game -->
<!-- --------------------------------------------------------------------------------------- -->
<div
  class="modal fade"
  id="exampleModalToggle-2"
  aria-hidden="true"
  aria-labelledby="exampleModalToggleLabel"
  tabindex="-1"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalToggleLabel">Game</h1>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body overflow-y-scroll" style="max-height: 400px">
        <div>
          <span class="m-0 p-0">Title:</span>
          <p class="m-0 p-0 fw-bold fs-5 border-b">{{ gameDetails.title }}</p>
          <span class="m-0 p-0">Subtitle:</span>
          <p class="m-0 p-0 border-b">{{ gameDetails.subtitle }}</p>
          <p class="m-0 p-0 border-b">
            Level: <span class="text"> {{ gameDetails.level }} </span>
          </p>
        </div>
        <div class="d-flex justify-content-center align-items-center p-3">
          <img
            src="https://nesyan-api.runasp.net/{{ gameDetails.image }}"
            alt="{{ gameDetails.title }}"
            width="150px"
            height="150px"
          />
        </div>
      </div>
      <div class="modal-footer">
        <button
          class="btn btn-primary"
          data-bs-target="#exampleModalToggle"
          data-bs-toggle="modal"
        >
          Back
        </button>
      </div>
    </div>
  </div>
</div>
