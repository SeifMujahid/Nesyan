<!-- --------------------------------------------------------------------------------------- -->
<!-- main -->
<!-- --------------------------------------------------------------------------------------- -->
<section
  class="main-section d-flex justify-content-center align-items-start gap-4"
>
  <div class="container">
    <div
      class="top d-flex justify-content-between align-items-center mb-4 border-b"
    >
      <h2>
        <i class="fa-solid fa-user-tie me-2"></i>
        {{ "PROFILE.RELATIVE_PROFILE" | translate }}
      </h2>
      <a routerLink="/relative" class="btn btn-primary">
        {{ "PROFILE.BACK_BTN" | translate }}
      </a>
    </div>

    <div
      class="profile-content d-flex justify-content-between align-content-start w-100 p-2"
      [formGroup]="profileForm"
    >
      <!-- ── Profile Image ── -->
      <div class="profile-image col-2 rounded me-2">
        <div class="image-wrapper" [class.image-editable]="isEditMode">
          <img
            class="w-100 rounded"
            src="https://nesyan-api.runasp.net/{{ imagePreview }}"
            [attr.alt]="'PROFILE.RELATIVE_PROFILE' | translate"
          />
          <!-- Overlay shown only in edit mode -->
          <label *ngIf="isEditMode" for="imageUpload" class="image-overlay">
            <i class="fa-solid fa-camera"></i>
            <span>{{ "PROFILE.CHANGE_PHOTO" | translate }}</span>
          </label>
        </div>
        <input
          type="file"
          id="imageUpload"
          accept="image/*"
          class="d-none"
          (change)="onImageChange($event)"
        />
      </div>

      <!-- ── Form ── -->
      <div class="form-Container col-10">
        <form class="d-flex flex-column justify-content-center w-100 p-2">
          <!-- First Name & Last Name -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="firstName">{{
                "PROFILE.FIRST_NAME" | translate
              }}</label>
              <input
                type="text"
                id="firstName"
                formControlName="fName"
                [class.editable-field]="isEditMode"
              />
            </div>
            <div class="form-group">
              <label for="lastName">{{
                "PROFILE.LAST_NAME" | translate
              }}</label>
              <input
                type="text"
                id="lastName"
                formControlName="lName"
                [class.editable-field]="isEditMode"
              />
            </div>
          </div>

          <!-- Username & Age -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="userName">{{
                "PROFILE.USER_NAME" | translate
              }}</label>
              <input
                type="text"
                id="userName"
                formControlName="userName"
                [class.editable-field]="isEditMode"
              />
            </div>
            <div class="form-group">
              <label for="age">{{ "PROFILE.AGE" | translate }}</label>
              <input
                type="number"
                id="age"
                formControlName="age"
                [class.editable-field]="isEditMode"
              />
            </div>
          </div>

          <!-- Country & City -->
          <div
            class="form-bottom d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="country">{{ "PROFILE.COUNTRY" | translate }}</label>
              <select
                id="country"
                formControlName="country"
                [class.editable-field]="isEditMode"
              >
                <option value="" disabled hidden>
                  {{ "PROFILE.SELECT_COUNTRY" | translate }}
                </option>
                <option value="egypt">
                  {{ "COUNTRIES.EGYPT" | translate }}
                </option>
                <option value="saudi-arabia">
                  {{ "COUNTRIES.SAUDI_ARABIA" | translate }}
                </option>
                <option value="kuwait">
                  {{ "COUNTRIES.KUWAIT" | translate }}
                </option>
                <option value="qatar">
                  {{ "COUNTRIES.QATAR" | translate }}
                </option>
                <option value="uae">{{ "COUNTRIES.UAE" | translate }}</option>
                <option value="algeria">
                  {{ "COUNTRIES.ALGERIA" | translate }}
                </option>
              </select>
            </div>
            <div class="form-group">
              <label for="city">{{ "PROFILE.CITY" | translate }}</label>
              <input
                type="text"
                id="city"
                formControlName="city"
                [class.editable-field]="isEditMode"
              />
            </div>
          </div>

          <!-- Phone & Email -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="phone">{{ "PROFILE.PHONE" | translate }}</label>
              <input
                type="text"
                id="phone"
                formControlName="phone"
                [class.editable-field]="isEditMode"
              />
            </div>
            <div class="form-group">
              <label for="email">
                {{ "PROFILE.EMAIL" | translate }}
                <span class="readonly-badge">{{
                  "PROFILE.READONLY_BADGE" | translate
                }}</span>
              </label>
              <input type="email" id="email" formControlName="email" />
            </div>
          </div>

          <!-- Gender & National ID -->
          <div
            class="form-top d-flex justify-content-between align-items-center w-100"
          >
            <div class="form-group">
              <label for="gender">
                {{ "PROFILE.GENDER" | translate }}
                <span class="readonly-badge">{{
                  "PROFILE.READONLY_BADGE" | translate
                }}</span>
              </label>
              <input type="text" id="gender" formControlName="gender" />
            </div>
            <div class="form-group">
              <label for="nationalId">
                {{ "PROFILE.NATIONAL_ID" | translate }}
                <span class="readonly-badge">{{
                  "PROFILE.READONLY_BADGE" | translate
                }}</span>
              </label>
              <input type="text" id="nationalId" formControlName="nationalId" />
            </div>
          </div>
        </form>

        <!-- Actions -->
        <div
          class="w-100 d-flex justify-content-end align-items-center gap-2 p-2"
        >
          <button
            class="btn btn-outline-secondary"
            *ngIf="isEditMode"
            (click)="toggleEdit()"
          >
            {{ "PROFILE.CANCEL_BTN" | translate }}
          </button>
          <button
            class="btn btn-primary"
            *ngIf="!isEditMode"
            (click)="toggleEdit()"
          >
            <i class="fa-solid fa-pen me-1"></i>
            {{ "PROFILE.EDIT_BTN" | translate }}
          </button>
          <button
            *ngIf="isEditMode"
            class="btn btn-success"
            [disabled]="profileForm.invalid"
            (click)="saveProfile()"
          >
            <i class="fa-solid fa-floppy-disk me-1"></i>
            {{ "PROFILE.SAVE_BTN" | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
