<div
  class="tab-content d-flex flex-column justify-content-center align-items-center gap-3 w-100"
>
  <div class="top-part d-flex justify-content-between align-items-center w-100">
    <div class="right">
      <p class="p-0 m-0 fw-bold fs-5">
        <i class="fa-solid fa-list-check me-1 fs-4" style="color: #00a63e"></i>
        Daily Routine
      </p>
      <p class="text-muted m-0 p-0">Manage patient's Daily Routine</p>
    </div>
    <div class="left">
      <button
        data-bs-target="#exampleModalToggle"
        data-bs-toggle="modal"
        (click)="changeToAdd()"
      >
        <i class="fa-regular fa-square-plus me-1 fs-5"></i>Add Task
      </button>
    </div>
  </div>
  <div
    class="tasks-list w-100 d-flex flex-column justify-content-start align-items-center gap-2"
    *ngFor="let routine of patientRoutineList; let i = index"
  >
    <div class="task" [class.done]="routine.isCompleted">
      <div
        class="text-muted flex-grow-1"
        data-bs-target="#exampleModalToggle"
        data-bs-toggle="modal"
        (click)="changeToEDit(routine.id, i)"
      >
        <p>{{ routine.title }}</p>
        <p>{{ routine.reminderTime }}</p>
      </div>
      <div class="trash-can" (click)="deleteRoutine(routine.id)">
        <i class="fa-solid fa-trash-can fs-5 text-danger"></i>
      </div>
    </div>
  </div>
</div>

                class="form-control"

                formControlName="title"
                required
                placeholder="e.g.. Morning walk"
              />
            </div>

            <div class="form-group mb-2">
              <label for="routine-frequency" class="form-label"

              >
              <select

                class="form-select"
                formControlName="frequency"
                required
              >
                <option value="" disabled selected hidden>
                  Select routine frequency
                </option>
                <option value="1">OneTime</option>
                <option value="2">Daily</option>
                <option value="3">Weekly</option>
                <option value="4">Monthly</option>
                <option value="5">Custom</option>
              </select>
